name: Flatten Magnet Vault

on:
  push:
    paths:
      - 'magnet_vault/**' # Triggers automatically when anything inside magnet_vault changes
  workflow_dispatch: # Allows you to run it manually via the Actions tab

permissions:
  contents: write # Needed to commit and push changes back to your repo

jobs:
  flatten:
    runs-on: ubuntu-latest
    steps:
      # 1. Pull down the repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Safely move everything to root and clear the folder
      - name: Move Files to Root
        run: |
          if [ -d "magnet-vault" ]; then
            echo "📁 Found magnet_vault folder. Moving all files outside..."
            
            # Move normal files and folders
            mv magnet-vault/* ./ 2>/dev/null || true
            
            # Move hidden files (like .env or .gitignore) if they exist
            mv magnet-vault/.* ./ 2>/dev/null || true
            
            # Remove the now empty folder
            rm -rf magnet-vault
            echo "✅ All files moved to root and magnet_vault folder removed."
          else
            echo "❌ magnet_vault folder not found. Skipping move."
            exit 0
          fi

      # 3. Save changes back to GitHub to trigger Vercel
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@://github.com"
          
          # Stage all modifications, new locations, and deletions
          git add -A
          
          if git diff-index --quiet HEAD; then
            echo "ℹ️ No changes detected. Root files are already up to date."
          else
            git commit -m "Automated layout: Extracted contents of magnet-vault to root"
            git push origin HEAD:${{ github.ref }}
          fi
