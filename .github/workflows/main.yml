name: Unzip to Root and Clean

on:
  push:
    branches:
      - main # Change to 'master' if your default branch is master
  workflow_dispatch: # Gives you a manual trigger button in GitHub Actions dashboard

permissions:
  contents: write

jobs:
  extract-flat:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Unzip and Flatten to Root
        run: |
          # 1. Locate the uploaded zip file
          ZIP_FILE=$(ls *.zip 2>/dev/null | head -n 1)
          
          if [ -z "$ZIP_FILE" ]; then
            echo "❌ No zip file found in the root directory."
            exit 1
          fi
          
          echo "📦 Unzipping $ZIP_FILE directly..."
          
          # Create a temporary staging area to look inside the zip folder structure
          mkdir tmp_extract
          unzip -o "$ZIP_FILE" -d tmp_extract
          
          # 2. Automatically flatten nested folders if they exist
          # Checks if there is exactly 1 folder inside the zip wrapping all your project contents
          if [ $(ls -1 tmp_extract | wc -l) -eq 1 ] && [ -d tmp_extract/* ]; then
            echo "⚠️ Detected a wrapper folder inside the zip. Flattening contents to root..."
            mv tmp_extract/*/* ./ 2>/dev/null || true
            mv tmp_extract/*/.* ./ 2>/dev/null || true # Move hidden files like .gitignore
          else
            echo "✅ Zip contents are flat. Moving directly to root..."
            mv tmp_extract/* ./ 2>/dev/null || true
            mv tmp_extract/.* ./ 2>/dev/null || true
          fi
          
          # 3. Clean up temporary directory and the original zip file
          rm -rf tmp_extract

      - name: Commit and Push to Branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@://github.com"
          
          git add .
          
          if git diff-index --quiet HEAD; then
            echo "ℹ️ No changes detected. Root directory matches zip content."
          else
            git commit -m "Automated Unzip: Flattened source files to root for Vercel deployment"
            git push origin HEAD:${{ github.ref }}
          fi
